name: Build WXS Environment

on:
  push:
    branches:
      - main
    paths:
      - "conda_environment/DNAseq/**"
      - "conda_environment/readme.md"
      - ".github/workflows/build-wxs-env.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/wxs-env

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./conda_environment/DNAseq
          file: ./conda_environment/DNAseq/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
